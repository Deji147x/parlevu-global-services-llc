<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 76" role="img" aria-label="Parlevu Global Services LLC">

  <!-- ── LEFT HOUSE ─────────────────────────── -->
  <polygon points="14,55 54,22 94,55" fill="#1b67b5"/>
  <rect x="26" y="54" width="56" height="20" fill="#1460aa"/>
  <rect x="35" y="61" width="12" height="9" rx="1" fill="#083060" stroke="rgba(255,255,255,.55)" stroke-width=".8"/>
  <rect x="62" y="61" width="12" height="9" rx="1" fill="#083060" stroke="rgba(255,255,255,.55)" stroke-width=".8"/>

  <!-- ── CENTER HOUSE (tallest) ─────────────── -->
  <polygon points="66,55 116,8 166,55" fill="#2878cc"/>
  <polygon points="66,55 116,8 166,55" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="1.2"/>
  <!-- Chimney -->
  <rect x="148" y="6" width="9" height="16" rx="1" fill="#1b67b5"/>
  <rect x="146" y="4" width="13" height="5" rx="1" fill="#1460aa"/>
  <!-- Body -->
  <rect x="81" y="54" width="70" height="20" fill="#1e70c8"/>
  <!-- Door -->
  <rect x="103" y="63" width="20" height="11" rx="2" fill="#083060" stroke="rgba(255,255,255,.4)" stroke-width=".8"/>
  <!-- Left window -->
  <rect x="85" y="59" width="13" height="10" rx="1" fill="#083060" stroke="rgba(255,255,255,.45)" stroke-width=".8"/>
  <line x1="91.5" y1="59" x2="91.5" y2="69" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
  <line x1="85" y1="64" x2="98" y2="64" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
  <!-- Right window -->
  <rect x="153" y="59" width="13" height="10" rx="1" fill="#083060" stroke="rgba(255,255,255,.45)" stroke-width=".8"/>
  <line x1="159.5" y1="59" x2="159.5" y2="69" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
  <line x1="153" y1="64" x2="166" y2="64" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>

  <!-- ── RIGHT HOUSE ─────────────────────────── -->
  <polygon points="142,55 172,28 202,55" fill="#1b67b5"/>
  <rect x="152" y="54" width="40" height="20" fill="#1460aa"/>
  <rect x="158" y="61" width="10" height="9" rx="1" fill="#083060" stroke="rgba(255,255,255,.5)" stroke-width=".8"/>
  <rect x="175" y="61" width="10" height="9" rx="1" fill="#083060" stroke="rgba(255,255,255,.5)" stroke-width=".8"/>

  <!-- ── PINE TREES ──────────────────────────── -->
  <!-- Tree 1 (back) -->
  <polygon points="204,55 216,28 228,55" fill="#104e96" opacity=".88"/>
  <rect x="212" y="53" width="5" height="7" fill="#083060"/>
  <!-- Tree 2 (tallest, front) -->
  <polygon points="220,55 235,17 250,55" fill="#1b67b5"/>
  <polygon points="222,47 235,25 248,47" fill="#2070be"/>
  <polygon points="224,38 235,16 246,38" fill="#2878cc"/>
  <rect x="231" y="53" width="5" height="7" fill="#083060"/>

  <!-- ── BRAND TEXT ──────────────────────────── -->
  <text
    x="150" y="73"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="11"
    font-weight="900"
    letter-spacing="2.8"
    fill="white"
    stroke="#1460aa"
    stroke-width="2.5"
    paint-order="stroke fill">PARLEVU GLOBAL SERVICES LLC</text>

</svg>
